<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>RSA Encryption</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 20px; }\n        input { margin: 5px; }\n        button { margin-top: 10px; }\n    </style>\n</head>\n<body>\n    <h1>RSA Encryption</h1>\n    <label for="p">Prime p:</label><br>\n    <input type="text" id="p"><br>\n    <label for="q">Prime q:</label><br>\n    <input type="text" id="q"><br>\n    <label for="e">Public Exponent e:</label><br>\n    <input type="text" id="e"><br>\n    <label for="message">Plaintext Message:</label><br>\n    <input type="text" id="message"><br>\n    <button onclick="encryptMessage()">Encrypt</button>\n    <h2>Encrypted Message:</h2>\n    <p id="encryptedMessage"></p>\n    <script>\n        function gcd(a, b) {\n            while (b) {\n                let t = b;\n                b = a % b;\n                a = t;\n            }\n            return a;\n        }\n        function modinv(a, m) {\n            a = a % m;\n            for (let x = 1; x < m; x++) {\n                if ((a * x) % m === 1) return x;\n            }\n            return null;\n        }\n        function encryptMessage() {\n            const p = BigInt(document.getElementById('p').value);\n            const q = BigInt(document.getElementById('q').value);\n            const e = BigInt(document.getElementById('e').value);\n            const message = document.getElementById('message').value;\n            const n = p * q; // RSA Modulus\n            const encrypted = message.split('').map(char => {\n                const m = BigInt(char.charCodeAt(0));\n                return (m ** e % n).toString();\n            }).join(',');\n            document.getElementById('encryptedMessage').innerText = encrypted;\n        }\n    <\/script>\n</body>\n</html>
